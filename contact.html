<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f8fb; margin: 20px;">

    <h1 style="text-align: center; color: darkblue;">
        Contact Us
    </h1>

    <div style="width: 60%; margin: auto; background-color: white; padding: 20px; border: 2px solid #0077b6; border-radius: 10px;">

        <h2 style="color: #0077b6;">Get in Touch</h2>

        <p><strong>Hospital Name:</strong> City Care Hospital</p>
        <p><strong>Address:</strong> 123 Health Street, Ahmedabad, Gujarat</p>
        <p><strong>Phone:</strong> +91 98765 43210</p>
        <p><strong>Email:</strong> info@citycarehospital.com</p>
        <p><strong>Working Hours:</strong> Monday - Sunday (24/7)</p>

        <hr>

        <h2 style="color: #0077b6;">Contact Form</h2>

        <form>

            <label><strong>Full Name:</strong></label><br>
            <input type="text" placeholder="Enter your name"
                style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;"><br>

            <label><strong>Email:</strong></label><br>
            <input type="email" placeholder="Enter your email"
                style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;"><br>

            <label><strong>Phone:</strong></label><br>
            <input type="tel" placeholder="Enter your phone number"
                style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;"><br>

            <label><strong>Message:</strong></label><br>
            <textarea rows="5" placeholder="Write your message"
                style="width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px;"></textarea><br>

            <input type="submit" value="Send Message"
                style="background-color:#0077b6; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">

            <input type="reset" value="Clear"
                style="background-color:#dc3545; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; margin-left:10px;">

        </form>

    </div>

</body>
</html>
