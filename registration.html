<!DOCTYPE html>
<html>
<head>
    <title>Registration Page</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif; background:#f2f2f2; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div style="background:#fff; width:350px; padding:30px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2);">
        <h2 style="text-align:center; color:#333; margin-bottom:20px;">Registration Form</h2>

        <form>
            <input
                type="text"
                placeholder="Full Name"
                style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;"
            >

            <input
                type="email"
                placeholder="Email Address"
                style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;"
            >

            <input
                type="text"
                placeholder="Username"
                style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;"
            >

            <input
                type="password"
                placeholder="Password"
                style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;"
            >

            <input
                type="password"
                placeholder="Confirm Password"
                style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;"
            >

            <button
                type="submit"
                style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; font-size:16px;"
            >
                Register
            </button>
        </form>

        <p style="text-align:center; margin-top:15px; font-size:14px;">
            Already have an account?
            <a href="#" style="color:#007BFF; text-decoration:none;">Login</a>
        </p>
    </div>

</body>
</html>
